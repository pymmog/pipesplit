# ~/.config/pipesplit/outputs.conf
#
# Output devices for pipesplit.
# Format: key = node_pattern, Human Label
#
# key:          Short name used as CLI argument (e.g. pipesplit soundblaster)
# node_pattern: Substring matched against PipeWire node names
#               Find device names with: pw-cli ls Node | grep alsa_output
# Human Label:  Friendly name shown in notifications and status output
#
# Devices are listed in toggle order. The first device is the default on first run.

soundblaster = Sound_Blaster_X4, Sound Blaster X4
elgato        = Wave_XLR,        Elgato Wave XLR

# Virtual sinks connected to the selected output device (headphone monitor sinks)
hp_sinks = hp-games hp-music

# Virtual sinks to verify in: pipesplit status
virtual_sinks = hp-games hp-music stream-games stream-music
