# ~/.config/pipesplit/routes.conf
#
# Map application node names to sink pairs.
# Format: app_pattern = hp_sink, stream_sink
#
# app_pattern is matched as a substring against PipeWire node names.
# Find running app names with: pw-link -ol | grep -oP '^[^:]+' | sort -u

spotify         = hp-music, stream-music
.exe            = hp-games, stream-games

# Add more apps as needed:
# firefox         = hp-games, stream-games
# discord         = hp-games, stream-games
# mpv             = hp-music, stream-music
