# ~/.config/pipesplit/routes.conf
#
# Map application node names to sink pairs.
# Format: app_pattern = sink[, stream_sink]
#
# app_pattern is matched as a substring against PipeWire node names.
# Find running app names with: pw-link -ol | grep -oP '^[^:]+' | sort -u
#
# stream_sink is optional — omit it to route only to headphones.

spotify               = music, stream-music
.exe                  = games, stream-games
Chromium              = browser
Discord               = voice

# Add more apps as needed:
# firefox             = browser, stream-browser
#
# for native Linux games use the correct name from the command above
# RESIDENT EVIL requiem = games, stream-games
#
# for single outputs without stream use only one sink
# Zen                   = browser
